name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Build, Test and Deploy Backend
    runs-on: ubuntu-latest

    steps:
      # ==========================
      # Checkout
      # ==========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================
      # Notificación inicio
      # ==========================
      - name: Notify Telegram - Pipeline Started
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_TO" \
          -d text="🚀 CI/CD PIPELINE INICIADO

          📦 Proyecto: Backend Pilas
          🌿 Rama: ${{ github.ref_name }}
          👤 Usuario: ${{ github.actor }}

          Se ejecutarán:
          ✅ Instalación
          ✅ Pruebas
          ✅ SonarCloud
          ✅ Build Validation
          ✅ Deploy Render"

      # ==========================
      # Node.js
      # ==========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ==========================
      # Instalar dependencias
      # ==========================
      - name: Install dependencies
        run: npm ci

      # ==========================
      # Ejecutar pruebas
      # ==========================
      - name: Run Tests
        run: npm test

      # ==========================
      # SonarCloud Scan
      # ==========================
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=JoseSanmartin1999_Pilas--backend
            -Dsonar.organization=josesanmartin1999
            -Dsonar.sources=src
            -Dsonar.host.url=https://sonarcloud.io

      # ==========================
      # Quality Gate
      # ==========================
      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ==========================
      # Validación servidor
      # ==========================
      - name: Validate server entrypoint
        run: |
          test -f src/server.js

      # ==========================
      # Crear artefacto
      # ==========================
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-source
          path: |
            src
            package.json
            package-lock.json

      # ==========================
      # Deploy Render
      # ==========================
      - name: Deploy to Render
        id: deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -s -X POST "$RENDER_DEPLOY_HOOK"

      # ==========================
      # Esperar despliegue
      # ==========================
      - name: Wait for Render Deployment
        run: sleep 30

      # ==========================
      # Telegram éxito
      # ==========================
      - name: Notify Telegram Success
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_TO" \
          -d text="✅ PIPELINE COMPLETADO

          📦 Proyecto: Backend Pilas

          ✔ Dependencias instaladas
          ✔ Pruebas superadas
          ✔ SonarCloud aprobado
          ✔ Build validado
          ✔ Despliegue Render ejecutado

          🌿 Rama: ${{ github.ref_name }}
          👤 Usuario: ${{ github.actor }}

          🟢 Estado: EXITOSO"

      # ==========================
      # Telegram error / cancelado
      # ==========================
      - name: Notify Telegram Failure
        if: failure() || cancelled()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_TO" \
          -d text="❌ PIPELINE DETENIDO o FALLIDO

          📦 Proyecto: Backend Pilas

          El flujo no se completó debido a un error o fue cancelado.

          🔴 Estado del Job: ${{ job.status }}
          🌿 Rama: ${{ github.ref_name }}
          👤 Usuario: ${{ github.actor }}

          Revisa GitHub Actions para identificar la etapa exacta y ver los detalles."