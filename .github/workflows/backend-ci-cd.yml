name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  notify-start:
    name: Notify Start
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram - Pipeline Started
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_TO }}" \
            -d parse_mode="HTML" \
            --data-urlencode "text=🚀 <b>CI/CD PIPELINE INICIADO</b>

📦 <b>Proyecto:</b> Backend Pilas
🌿 <b>Rama:</b> ${{ github.ref_name }}
👤 <b>Usuario:</b> ${{ github.actor }}

Se ejecutarán las siguientes fases:
🌿 • <b>Validación de Flujo de Ramas (PRs)</b>
🧪 • <b>Pruebas Unitarias y Cobertura</b>
🔍 • <b>Análisis de Calidad (SonarCloud)</b>
🚀 • <b>Despliegue a Producción (Render)</b>"

  validate-branch:
    name: Validate Branch Flow
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Merge Rules
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"
          
          echo "Validando flujo de trabajo: de '$SOURCE_BRANCH' hacia '$TARGET_BRANCH'"
          
          if [ "$TARGET_BRANCH" = "main" ]; then
            if [ "$SOURCE_BRANCH" != "develop" ] && [[ ! "$SOURCE_BRANCH" =~ ^hotfix/ ]]; then
              echo "::error::Las ramas que se fusionan en 'main' deben ser únicamente 'develop' o comenzar con 'hotfix/'."
              exit 1
            fi
          elif [ "$TARGET_BRANCH" = "develop" ]; then
            if [[ ! "$SOURCE_BRANCH" =~ ^(feature|bugfix|hotfix)/ ]]; then
              echo "::error::Las ramas que se fusionan en 'develop' deben comenzar con 'feature/', 'bugfix/' o 'hotfix/'."
              exit 1
            fi
          fi
          echo "✅ Flujo de rama válido."

  test:
    name: Test Phase
    needs: validate-branch
    uses: ./.github/workflows/test-job.yml

  sonar:
    name: SonarCloud Phase
    needs: [validate-branch, test]
    uses: ./.github/workflows/sonar-job.yml
    secrets: inherit

  deploy:
    name: Deploy Phase
    needs: [validate-branch, test, sonar]
    # Solo se despliega a producción en push directo o merge aprobado en 'main'
    if: github.event_name == 'push' && github.ref_name == 'main'
    uses: ./.github/workflows/deploy-job.yml
    secrets: inherit

  notify-end:
    name: Notify End
    needs: [validate-branch, test, sonar, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram Notification
        shell: bash
        run: |
          # Función para formatear el estado de cada fase en español
          get_status_info() {
            case "$1" in
              success)
                echo "✅ Exitoso"
                ;;
              failure)
                echo "❌ Fallido"
                ;;
              cancelled)
                echo "🚫 Cancelado"
                ;;
              skipped)
                echo "➖ Omitido"
                ;;
              *)
                echo "❓ Desconocido"
                ;;
            esac
          }

          # Obtener estado de cada job
          VALIDATE_STATUS=$(get_status_info "${{ needs.validate-branch.result }}")
          TEST_STATUS=$(get_status_info "${{ needs.test.result }}")
          SONAR_STATUS=$(get_status_info "${{ needs.sonar.result }}")
          DEPLOY_STATUS=$(get_status_info "${{ needs.deploy.result }}")

          # Determinar el estado general y el emoji correspondiente
          if [ "${{ needs.validate-branch.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.sonar.result }}" = "failure" ] || \
             [ "${{ needs.deploy.result }}" = "failure" ]; then
            OVERALL_EMOJI="❌"
            OVERALL_TEXT="PIPELINE FALLIDO O INCOMPLETO"
            OVERALL_STATUS="🔴 FALLIDO"
          else
            OVERALL_EMOJI="✅"
            OVERALL_TEXT="PIPELINE COMPLETADO CON ÉXITO"
            OVERALL_STATUS="🟢 EXITOSO"
          fi

          # Construir el mensaje con formato HTML para Telegram
          MESSAGE="<b>$OVERALL_EMOJI $OVERALL_TEXT</b>

📦 <b>Proyecto:</b> Backend Pilas
🌿 <b>Rama:</b> ${{ github.ref_name }}
👤 <b>Usuario:</b> ${{ github.actor }}
🟢 <b>Estado General:</b> $OVERALL_STATUS

📊 <b>Resumen por Fases:</b>
🌿 • <b>Validación de Ramas:</b> $VALIDATE_STATUS
🧪 • <b>Pruebas Unitarias:</b> $TEST_STATUS
🔍 • <b>SonarCloud / Quality Gate:</b> $SONAR_STATUS
🚀 • <b>Despliegue Render:</b> $DEPLOY_STATUS

🔗 <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Ver detalles en GitHub Actions</a>"

          # Enviar mensaje a Telegram
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_TO }}" \
            -d parse_mode="HTML" \
            --data-urlencode "text=$MESSAGE"
